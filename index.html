<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {

html, body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); height: 100%; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

.login-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
.login-user-btns { display: flex; gap: 10px; }
.login-user-btn { flex: 1; padding: 14px 8px; border: 1px solid var(--border); border-radius: 2px; background: var(--warm-white); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.2s; letter-spacing: 0.04em; }
.login-user-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.login-input { padding: 14px 16px; border: 1px solid var(--border); border-radius: 2px; background: var(--warm-white); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 300; color: var(--text); outline: none; text-align: center; letter-spacing: 0.15em; transition: border-color 0.2s; -webkit-appearance: none; }
.login-input:focus { border-color: var(--accent); }
.login-btn { padding: 14px; background: var(--text); color: var(--warm-white); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }

.popup-actions { display: flex; align-items: center; justify-content: space-between; }

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBprZ3QdL8RPwNH62cqUZA9fge5ylggLO8",
  authDomain: "mapa-b7373.firebaseapp.com",
  projectId: "mapa-b7373",
  storageBucket: "mapa-b7373.firebasestorage.app",
  messagingSenderId: "532393871600",
  appId: "1:532393871600:web:ccd5af66ecbfdb1df41a35"
});
var db = firebase.firestore();
var auth = firebase.auth();

// ── LOGIN ──
var usuariSeleccionat = null;

function seleccionarUsuari(nom) {
  usuariSeleccionat = nom;
  document.getElementById('btnJana').classList.toggle('selected', nom === 'jana');
  document.getElementById('btnElia').classList.toggle('selected', nom === 'elia');
  document.getElementById('loginInput').focus();
}

function ferLogin() {
  if (!usuariSeleccionat) { document.getElementById('loginError').textContent = 'Selecciona qui ets'; return; }
  var pw = document.getElementById('loginInput').value;
  if (!pw) { document.getElementById('loginError').textContent = 'Escriu la contrasenya'; return; }
  document.getElementById('loginError').textContent = '';
  auth.signInWithEmailAndPassword(usuariSeleccionat + '@nostre.app', pw)
    .catch(function() {
      document.getElementById('loginError').textContent = 'Contrasenya incorrecta';
      document.getElementById('loginInput').value = '';
    });
}

function ferLogout() {
  if (!confirm('Tancar sessió?')) return;
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    usuariActual = user.email.split('@')[0];
    document.getElementById('userBadge').textContent = usuariActual;
    inicialitzar();
  } else {
    usuariActual = null;
    inicialitzatJa = false;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginInput').value = '';
    document.getElementById('loginError').textContent = '';
    usuariSeleccionat = null;
    document.getElementById('btnJana').classList.remove('selected');
    document.getElementById('btnElia').classList.remove('selected');
  }
});

// ── ESTAT ──
var map = null, clusterGroup = null, coordsTriades = null;
var fotoFileRecord = null;
var markers = {}, llocData = {};
var recordOvertFromGraella = false;
var picking = false, tempMarker = null;
var recordsListener = null, llocActualId = null;
var usuariActual = null, inicialitzatJa = false;

// ── INIT ──
function inicialitzar() {
  if (inicialitzatJa) return;
  inicialitzatJa = true;
  var inici = new Date('2024-09-20');
  document.getElementById('dies').textContent = Math.floor((new Date() - inici) / 86400000);
  map = L.map('map', { center: [41.5, 2.0], zoom: 7 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      var n = cluster.getChildCount();
      return L.divIcon({
        html: '<div style="background:rgba(201,132,106,0.85);color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.2);">' + n + '</div>',
        className: '', iconSize: [32,32], iconAnchor: [16,16]
      });
    }
  });
  map.addLayer(clusterGroup);
  map.on('click', function(e) {
    if (!picking) return;
    coordsTriades = { lat: e.latlng.lat, lng: e.latlng.lng };
    if (tempMarker) map.removeLayer(tempMarker);
    tempMarker = L.circleMarker([e.latlng.lat, e.latlng.lng], { radius: 6, color: '#c9846a', fillColor: '#c9846a', fillOpacity: 1, weight: 2 }).addTo(map);
    document.body.classList.remove('picking');
    picking = false;
    document.getElementById('coordsDisplay').textContent = e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4);
    document.getElementById('modalLloc').classList.add('active');
  });
  map.on('zoomend', function() { actualitzarIconesZoom(); });
  carregarPins();
}

// ── UTILS ──
function previsualitzar(inputId, previewId) {
  var file = document.getElementById(inputId).files[0];
  if (!file) return;
  fotoFileRecord = file;
  var prev = document.getElementById(previewId);
  prev.src = URL.createObjectURL(file);
  prev.style.display = 'block';
}

function comprimirImatge(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      var maxW = 1000, q = 0.75, w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', q));
    };
    img.src = url;
  });
}

function tancarModal(id) { document.getElementById(id).classList.remove('active'); }
function tancarModalSiFons(e, id) { if (e.target === document.getElementById(id)) tancarModal(id); }
function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
function fmtData(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ca-ES', { year: 'numeric', month: 'long' });
}
function nomUsuari(u) {
  if (!u) return '';
  return u.charAt(0).toUpperCase() + u.slice(1);
}

// ── ICONES ──
function iconPin() {
  return L.divIcon({ className: '', html: '<div class="custom-pin"></div>', iconSize: [12,12], iconAnchor: [6,6] });
}
function iconFoto(foto) {
  var html = foto ? '<div class="foto-pin-wrap"><img src="' + foto + '" alt=""></div>' : '<div class="foto-pin-wrap"></div>';
  return L.divIcon({ className: '', html: html, iconSize: [48,48], iconAnchor: [24,24] });
}
function obtenirFotoPerPin(id, d, callback) {
  if (d.portadaAleatoria) {
    db.collection('llocs').doc(id).collection('records').get().then(function(snap) {
      var ambFoto = [];
      snap.forEach(function(doc) { if (doc.data().foto) ambFoto.push(doc.data().foto); });
      callback(ambFoto.length > 0 ? ambFoto[Math.floor(Math.random() * ambFoto.length)] : null);
    });
  } else {
    callback(d.portadaFoto || null);
  }
}
function actualitzarIconesZoom() {
  var zoom = map.getZoom();
  Object.keys(markers).forEach(function(id) {
    var d = llocData[id];
    if (!d || !markers[id]) return;
    if (zoom >= 12) {
      obtenirFotoPerPin(id, d, function(foto) { if (markers[id]) markers[id].setIcon(iconFoto(foto)); });
    } else {
      markers[id].setIcon(iconPin());
    }
  });
}

// ── PINS ──
function carregarPins() {
  db.collection('llocs').onSnapshot(function(snapshot) {
    snapshot.docChanges().forEach(function(change) {
      var id = change.doc.id, d = change.doc.data();
      if (change.type === 'added') { llocData[id] = d; afegirMarker(id, d); }
      if (change.type === 'modified') {
        llocData[id] = d;
        if (markers[id]) { clusterGroup.removeLayer(markers[id]); delete markers[id]; }
        afegirMarker(id, d);
      }
      if (change.type === 'removed') {
        delete llocData[id];
        if (markers[id]) { clusterGroup.removeLayer(markers[id]); delete markers[id]; }
      }
    });
    document.getElementById('loading').classList.add('hidden');
  });
}

function afegirMarker(id, d) {
  var zoom = map && map.getZoom ? map.getZoom() : 7;
  var fotoPopup = d.portadaFoto || null;
  var imatgeHTML = fotoPopup
    ? '<img class="popup-img" src="' + fotoPopup + '" alt="' + d.nom + '">'
    : '<div class="popup-no-img"><span>sense foto</span></div>';
  var popupHTML = imatgeHTML +
    '<div class="popup-inner">' +
      '<div class="popup-place">' + d.nom + '</div>' +
      (d.desc ? '<div class="popup-text">' + d.desc + '</div>' : '') +
      '<div class="popup-actions">' +
        '<button class="popup-btn-enter" onclick="obrirLloc(\'' + id + '\')">Veure records →</button>' +
        '<button class="popup-delete" onclick="eliminarLloc(\'' + id + '\')">Eliminar</button>' +
      '</div>' +
    '</div>';
  var popup = L.popup({ maxWidth: 230, closeButton: false }).setContent(popupHTML);
  var marker = L.marker([d.lat, d.lng], { icon: iconPin() }).bindPopup(popup);
  clusterGroup.addLayer(marker);
  markers[id] = marker;
  if (zoom >= 12) {
    obtenirFotoPerPin(id, d, function(foto) { if (markers[id]) markers[id].setIcon(iconFoto(foto)); });
  }
}

// ── LLOC ──
function iniciarAfegirPin() {
  coordsTriades = null;
  document.getElementById('editLlocId').value = '';
  document.getElementById('modalLlocTitol').textContent = 'Nou lloc';
  document.getElementById('inputNom').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('coordsDisplay').textContent = 'Cap ubicació triada';
  document.getElementById('ubicacioGroup').style.display = 'block';
  document.getElementById('btnDesarLloc').textContent = 'Desar lloc';
  document.getElementById('modalLloc').classList.add('active');
}

function editarLloc(id) {
  var d = llocData[id]; if (!d) return;
  document.getElementById('editLlocId').value = id;
  document.getElementById('modalLlocTitol').textContent = 'Editar lloc';
  document.getElementById('inputNom').value = d.nom || '';
  document.getElementById('inputDesc').value = d.desc || '';
  coordsTriades = { lat: d.lat, lng: d.lng };
  document.getElementById('ubicacioGroup').style.display = 'none';
  document.getElementById('btnDesarLloc').textContent = 'Desar canvis';
  tancarLloc();
  document.getElementById('modalLloc').classList.add('active');
}

function triarUbicacioAlMapa() {
  tancarModal('modalLloc');
  document.body.classList.add('picking');
  picking = true;
}

function desarLloc() {
  var nom = document.getElementById('inputNom').value.trim();
  var desc = document.getElementById('inputDesc').value.trim();
  var editId = document.getElementById('editLlocId').value;
  if (!nom) { mostrarToast('Escriu el nom del lloc'); return; }
  if (!editId && !coordsTriades) { mostrarToast('Tria la ubicació al mapa'); return; }
  var btn = document.getElementById('btnDesarLloc');
  btn.disabled = true; btn.textContent = 'Desant...';
  if (editId) {
    db.collection('llocs').doc(editId).update({ nom: nom, desc: desc || null })
      .then(function() { tancarModal('modalLloc'); mostrarToast('Lloc actualitzat!'); })
      .catch(function(e) { console.error(e); mostrarToast('Error en desar.'); })
      .finally(function() { btn.disabled = false; btn.textContent = 'Desar canvis'; });
  } else {
    db.collection('llocs').add({
      nom: nom, desc: desc || null, lat: coordsTriades.lat, lng: coordsTriades.lng,
      portadaFoto: null, portadaRecordId: null, portadaAleatoria: false,
      creatEl: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
      tancarModal('modalLloc'); mostrarToast('Lloc desat!');
    }).catch(function(e) { console.error(e); mostrarToast('Error en desar.'); })
      .finally(function() { btn.disabled = false; btn.textContent = 'Desar lloc'; });
  }
}

function eliminarLloc(id) {
  if (!confirm('Segur que vols eliminar aquest lloc i tots els seus records?')) return;
  db.collection('llocs').doc(id).collection('records').get().then(function(recs) {
    var batch = db.batch();
    recs.forEach(function(r) { batch.delete(r.ref); });
    batch.delete(db.collection('llocs').doc(id));
    return batch.commit();
  }).then(function() { mostrarToast('Lloc eliminat'); });
}

// ── OBRIR LLOC ──
function obrirLloc(id) {
  llocActualId = id;
  if (recordsListener) { recordsListener(); recordsListener = null; }
  document.getElementById('llocOverlay').classList.add('active');
  renderitzarLloc(id);
}

function renderitzarLloc(id) {
  var d = llocData[id] || {};
  if (d.portadaAleatoria) {
    db.collection('llocs').doc(id).collection('records').get().then(function(snap) {
      var ambFoto = [];
      snap.forEach(function(doc) { if (doc.data().foto) ambFoto.push(doc.data().foto); });
      construirLloc(id, d, ambFoto.length > 0 ? ambFoto[Math.floor(Math.random() * ambFoto.length)] : null, true);
    });
  } else {
    construirLloc(id, d, d.portadaFoto || null, false);
  }
}

function construirLloc(id, d, portadaFoto, esAleatoria) {
  var imatgeHTML = portadaFoto
    ? '<div class="lloc-header"><img class="lloc-header-img" src="' + portadaFoto + '" alt=""><span class="lloc-header-badge">' + (esAleatoria ? 'aleatoria' : 'portada') + '</span></div>'
    : '<div class="lloc-header"><div class="lloc-header-nofoto"></div></div>';
  document.getElementById('llocScroll').innerHTML =
    imatgeHTML +
    '<div class="lloc-info">' +
      '<button class="lloc-close" onclick="tancarLloc()">×</button>' +
      '<div class="lloc-nom">' + (d.nom || '') + '</div>' +
      (d.desc ? '<div class="lloc-desc">' + d.desc + '</div>' : '') +
      '<div class="lloc-accions">' +
        '<button class="lloc-edit-btn" onclick="editarLloc(\'' + id + '\')">Editar</button>' +
        '<button class="lloc-portada-btn ' + (esAleatoria ? 'actiu' : '') + '" onclick="togglePortadaAleatoria(\'' + id + '\')">' + (esAleatoria ? '✓ ' : '') + 'portada aleatòria</button>' +
      '</div>' +
    '</div>' +
    '<div class="lloc-records-header">' +
      '<span class="lloc-records-title">Records</span>' +
      '<button class="btn-add-record" onclick="iniciarAfegirRecord(\'' + id + '\')">+ Afegir record</button>' +
    '</div>' +
    '<div class="records-grid" id="recordsGrid"></div>' +
    '<p class="records-empty" id="recordsEmpty" style="display:none">cap record encara. afegeix un!</p>';
  carregarRecords(id);
}

function tancarLloc() {
  document.getElementById('llocOverlay').classList.remove('active');
  if (recordsListener) { recordsListener(); recordsListener = null; }
  llocActualId = null;
}
function tancarLlocSiFons(e) { if (e.target === document.getElementById('llocOverlay')) tancarLloc(); }

// ── PORTADA ──
function togglePortadaAleatoria(llocId) {
  var d = llocData[llocId] || {};
  var activar = !d.portadaAleatoria;
  var dades = { portadaAleatoria: activar };
  if (activar) {
    // Desactivem portada fixa i traiem badges
    dades.portadaRecordId = null;
    db.collection('llocs').doc(llocId).collection('records').get().then(function(snap) {
      var batch = db.batch();
      snap.forEach(function(doc) { if (doc.data().esPortada) batch.update(doc.ref, { esPortada: false }); });
      batch.commit();
    });
  }
  db.collection('llocs').doc(llocId).update(dades).then(function() {
    mostrarToast(activar ? 'Portada aleatòria activada' : 'Portada aleatòria desactivada');
    renderitzarLloc(llocId);
  });
}

function establirPortada(llocId, recordId, fotoRecord) {
  // Establir portada fixa desactiva l'aleatori
  db.collection('llocs').doc(llocId).collection('records').get().then(function(snap) {
    var batch = db.batch();
    batch.update(db.collection('llocs').doc(llocId), {
      portadaFoto: fotoRecord || null, portadaRecordId: recordId, portadaAleatoria: false
    });
    snap.forEach(function(doc) { batch.update(doc.ref, { esPortada: doc.id === recordId }); });
    return batch.commit();
  }).then(function() {
    mostrarToast('Portada establerta!');
    tancarRecordDetall();
    renderitzarLloc(llocId);
  });
}

// ── RECORDS ──
function carregarRecords(llocId) {
  if (recordsListener) recordsListener();
  recordsListener = db.collection('llocs').doc(llocId).collection('records').orderBy('creatEl', 'asc')
    .onSnapshot(function(snapshot) {
      var grid = document.getElementById('recordsGrid');
      var buit = document.getElementById('recordsEmpty');
      if (!grid) return;
      var d = llocData[llocId] || {};
      var portadaId = (!d.portadaAleatoria && d.portadaRecordId) || null;
      snapshot.docChanges().forEach(function(change) {
        var id = change.doc.id, r = change.doc.data();
        var esPortada = !d.portadaAleatoria && ((id === portadaId) || r.esPortada);
        if (change.type === 'added' || change.type === 'modified') {
          var existent = document.getElementById('rc-' + id);
          var card = existent || document.createElement('div');
          card.className = 'record-card' + (esPortada ? ' es-portada' : '');
          card.id = 'rc-' + id;
          card.onclick = (function(rid, rdata) { return function() { obrirRecordDetall(llocId, rid, rdata); }; })(id, r);
          var metaHTML = (r.data || r.usuari)
            ? '<div class="record-card-meta">' +
                (r.data ? '<span>' + fmtData(r.data) + '</span>' : '') +
                (r.usuari ? '<span class="record-card-user">' + nomUsuari(r.usuari) + '</span>' : '') +
              '</div>'
            : '';
          card.innerHTML =
            (esPortada ? '<div class="record-portada-badge">portada</div>' : '') +
            (r.foto ? '<img class="record-card-img" src="' + r.foto + '" alt="">' : '<div class="record-card-nofoto"><span>✦</span></div>') +
            '<div class="record-card-body">' + metaHTML + (r.text ? '<div class="record-card-text">' + r.text + '</div>' : '') + '</div>';
          if (!existent) grid.appendChild(card);
        }
        if (change.type === 'removed') { var rem = document.getElementById('rc-' + id); if (rem) rem.remove(); }
      });
      if (buit) buit.style.display = (grid.children.length === 0) ? 'block' : 'none';
    });
}

function obrirRecordDetall(llocId, recordId, r) {
  var d = llocData[llocId] || {};
  var esPortada = !d.portadaAleatoria && ((d.portadaRecordId === recordId) || r.esPortada);
  var fotoEsc = r.foto ? '\'' + r.foto.replace(/'/g, '') + '\'' : 'null';
  var metaHTML = (r.data || r.usuari)
    ? '<div class="record-detall-meta">' +
        (r.data ? '<span>' + fmtData(r.data) + '</span>' : '') +
        (r.usuari ? '<span class="record-detall-user">' + nomUsuari(r.usuari) + '</span>' : '') +
      '</div>'
    : '';
  document.getElementById('recordDetall').innerHTML =
    '<div class="record-detall-drag"></div>' +
    (r.foto ? '<img class="record-detall-img" src="' + r.foto + '" alt="">' : '') +
    '<div class="record-detall-body">' +
      '<button class="record-detall-close" onclick="tancarRecordDetall()">×</button>' +
      metaHTML +
      (r.text ? '<div class="record-detall-text">' + r.text + '</div>' : '') +
      '<div class="record-detall-actions">' +
        '<button class="record-detall-edit" onclick="editarRecord(\'' + llocId + '\',\'' + recordId + '\')">Editar</button>' +
        (!esPortada && r.foto ? '<button class="record-detall-portada" onclick="establirPortada(\'' + llocId + '\',\'' + recordId + '\',' + fotoEsc + ')">Fer portada</button>' : '') +
        '<button class="record-detall-delete" onclick="eliminarRecord(\'' + llocId + '\',\'' + recordId + '\')">Eliminar</button>' +
      '</div>' +
    '</div>';
  document.getElementById('recordOverlay').classList.add('active');
}

function tancarRecordDetall() {
  document.getElementById('recordOverlay').classList.remove('active');
  if (recordOvertFromGraella) {
    recordOvertFromGraella = false;
    // Restaurar z-index de la graella
    document.getElementById('graellaOverlay').style.zIndex = '';
  }
}
function tancarRecordSiFons(e) { if (e.target === document.getElementById('recordOverlay')) tancarRecordDetall(); }

function iniciarAfegirRecord(llocId) {
  var obrirFormulari = function() {
    fotoFileRecord = null;
    document.getElementById('modalRecordTitol').textContent = 'Nou record';
    document.getElementById('recInputData').value = '';
    document.getElementById('recInputText').value = '';
    document.getElementById('recFotoPreview').style.display = 'none';
    document.getElementById('recInputFoto').value = '';
    document.getElementById('btnDesarRecord').dataset.llocId = llocId;
    document.getElementById('btnDesarRecord').dataset.recordId = '';
    document.getElementById('btnDesarRecord').textContent = 'Desar record';
    seleccionarUsuariRecord(usuariActual);
    document.getElementById('modalRecord').classList.add('active');
  };
  var overlay = document.getElementById('recordOverlay');
  if (overlay.classList.contains('active')) { overlay.classList.remove('active'); setTimeout(obrirFormulari, 50); }
  else obrirFormulari();
}

function editarRecord(llocId, recordId) {
  tancarRecordDetall();
  db.collection('llocs').doc(llocId).collection('records').doc(recordId).get().then(function(doc) {
    var r = doc.data(); fotoFileRecord = null;
    document.getElementById('modalRecordTitol').textContent = 'Editar record';
    document.getElementById('recInputData').value = r.data || '';
    document.getElementById('recInputText').value = r.text || '';
    if (r.foto) { document.getElementById('recFotoPreview').src = r.foto; document.getElementById('recFotoPreview').style.display = 'block'; }
    else document.getElementById('recFotoPreview').style.display = 'none';
    document.getElementById('recInputFoto').value = '';
    // Seleccionar usuari actual del record
    seleccionarUsuariRecord(r.usuari || usuariActual);
    document.getElementById('btnDesarRecord').dataset.llocId = llocId;
    document.getElementById('btnDesarRecord').dataset.recordId = recordId;
    document.getElementById('btnDesarRecord').textContent = 'Desar canvis';
    document.getElementById('modalRecord').classList.add('active');
  });
}

function desarRecord() {
  var btn = document.getElementById('btnDesarRecord');
  var llocId = btn.dataset.llocId, recordId = btn.dataset.recordId;
  if (!llocId) { mostrarToast('Error: torna a obrir el lloc'); return; }
  var data = document.getElementById('recInputData').value;
  var text = document.getElementById('recInputText').value.trim();
  if (!text && !fotoFileRecord && !recordId) { mostrarToast('Afegeix una foto o una descripció'); return; }
  btn.disabled = true; btn.textContent = 'Desant...';

  var guardar = function(foto) {
    var usuariTriat = document.querySelector('#recUsuariGroup .login-user-btn.selected');
    var dades = { data: data || null, text: text || null, usuari: usuariTriat ? usuariTriat.dataset.usuari : usuariActual };
    if (foto !== undefined) dades.foto = foto;
    var p;
    if (recordId) {
      p = db.collection('llocs').doc(llocId).collection('records').doc(recordId).update(dades);
      if (foto !== undefined && llocData[llocId] && llocData[llocId].portadaRecordId === recordId) {
        p = p.then(function() { return db.collection('llocs').doc(llocId).update({ portadaFoto: foto || null }); });
      }
    } else {
      dades.esPortada = false;
      dades.creatEl = firebase.firestore.FieldValue.serverTimestamp();
      p = db.collection('llocs').doc(llocId).collection('records').add(dades);
    }
    p.then(function() { tancarModal('modalRecord'); mostrarToast(recordId ? 'Record actualitzat!' : 'Record desat!'); })
     .catch(function(e) { console.error(e); mostrarToast('Error en desar.'); })
     .finally(function() { btn.disabled = false; btn.textContent = recordId ? 'Desar canvis' : 'Desar record'; });
  };
  if (fotoFileRecord) { btn.textContent = 'Comprimint foto...'; comprimirImatge(fotoFileRecord).then(guardar); }
  else guardar(undefined);
}

function eliminarRecord(llocId, recordId) {
  if (!confirm('Eliminar aquest record?')) return;
  var esPortada = llocData[llocId] && llocData[llocId].portadaRecordId === recordId;
  tancarRecordDetall();
  db.collection('llocs').doc(llocId).collection('records').doc(recordId).delete().then(function() {
    if (esPortada) return db.collection('llocs').doc(llocId).update({ portadaFoto: null, portadaRecordId: null });
  }).then(function() { mostrarToast('Record eliminat'); });
}

// ── SORPRESA ──
function sorpresa() {
  var ids = Object.keys(llocData);
  if (ids.length === 0) { mostrarToast('Encara no hi ha llocs!'); return; }
  var id = ids[Math.floor(Math.random() * ids.length)], d = llocData[id];
  map.setView([d.lat, d.lng], 14, { animate: true });
  setTimeout(function() { if (markers[id]) markers[id].openPopup(); }, 600);
}

// ── GRAELLA ──
function obrirGraella() {
  document.getElementById('graellaOverlay').classList.add('active');
  var grid = document.getElementById('graellaGrid');
  grid.innerHTML = '';
  var ids = Object.keys(llocData);
  if (ids.length === 0) { grid.innerHTML = '<p style="padding:20px;color:var(--text-muted);font-style:italic;grid-column:1/-1;">Encara no hi ha llocs.</p>'; return; }
  Promise.all(ids.map(function(llocId) {
    return db.collection('llocs').doc(llocId).collection('records').get().then(function(snap) {
      var items = [];
      snap.forEach(function(doc) { items.push({ llocId: llocId, recordId: doc.id, data: doc.data(), nom: llocData[llocId] ? llocData[llocId].nom : '' }); });
      return items;
    });
  })).then(function(resultats) {
    var tots = [];
    resultats.forEach(function(items) { tots = tots.concat(items); });
    if (tots.length === 0) { grid.innerHTML = '<p style="padding:20px;color:var(--text-muted);font-style:italic;grid-column:1/-1;">Encara no hi ha records.</p>'; return; }
    tots.forEach(function(item) {
      var el = document.createElement('div');
      el.className = 'graella-item';
      el.innerHTML = item.data.foto
        ? '<img src="' + item.data.foto + '" alt="' + item.nom + '"><div class="graella-lloc-label">' + item.nom + '</div>'
        : '<div class="graella-item-nofoto"><span>' + item.nom + '</span></div>';
      el.onclick = function() {
        recordOvertFromGraella = true;
        // Bajar z-index de la graella para que el record quede encima
        document.getElementById('graellaOverlay').style.zIndex = '2500';
        obrirRecordDetall(item.llocId, item.recordId, item.data);
      };
      grid.appendChild(el);
    });
  });
}

// ── ESTADÍSTIQUES ──
function obrirStats() {
  document.getElementById('statsOverlay').classList.add('active');
  var scroll = document.getElementById('statsScroll');
  scroll.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-style:italic;font-size:13px;">Carregant...</div>';

  var ids = Object.keys(llocData);
  if (ids.length === 0) {
    scroll.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-style:italic;font-size:13px;">Encara no hi ha dades.</div>';
    return;
  }

  Promise.all(ids.map(function(llocId) {
    return db.collection('llocs').doc(llocId).collection('records').get().then(function(snap) {
      var items = [];
      snap.forEach(function(doc) { items.push({ llocId: llocId, recordId: doc.id, data: doc.data(), nomLloc: llocData[llocId] ? llocData[llocId].nom : '' }); });
      return items;
    });
  })).then(function(resultats) {
    var tots = [];
    resultats.forEach(function(items) { tots = tots.concat(items); });

    var totalLlocs = ids.length;
    var totalRecords = tots.length;

    // Records per lloc
    var perLloc = {};
    ids.forEach(function(id) { perLloc[id] = 0; });
    tots.forEach(function(r) { perLloc[r.llocId] = (perLloc[r.llocId] || 0) + 1; });
    var llocsSorted = ids.slice().sort(function(a, b) { return perLloc[b] - perLloc[a]; });
    var maxPerLloc = perLloc[llocsSorted[0]] || 1;

    // Records per usuari
    var perUsuari = {};
    tots.forEach(function(r) {
      var u = r.data.usuari || 'desconegut';
      perUsuari[u] = (perUsuari[u] || 0) + 1;
    });

    // Records per mes
    var perMes = {};
    tots.forEach(function(r) {
      if (r.data.data) {
        var mes = r.data.data.substring(0, 7); // YYYY-MM
        perMes[mes] = (perMes[mes] || 0) + 1;
      }
    });
    var mesosKeys = Object.keys(perMes).sort();
    var maxPerMes = mesosKeys.length > 0 ? Math.max.apply(null, mesosKeys.map(function(m) { return perMes[m]; })) : 1;

    // Lloc amb més records
    var llocEstrella = llocData[llocsSorted[0]] ? llocData[llocsSorted[0]].nom : '—';

    // Dies des de l'inici
    var inici = new Date('2024-09-20');
    var diesTotal = Math.floor((new Date() - inici) / 86400000);

    // Format mes llegible
    function fmtMes(m) {
      if (!m) return '';
      var parts = m.split('-');
      var noms = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
      return noms[parseInt(parts[1]) - 1] + ' ' + parts[0].substring(2);
    }

    var usuaris = Object.keys(perUsuari);
    var userSplitHTML = '';
    if (usuaris.length > 0) {
      userSplitHTML = '<div class="stats-section-title">records per persona</div><div class="stats-user-split">';
      ['jana','elia'].forEach(function(u) {
        var n = perUsuari[u] || 0;
        var pct = totalRecords > 0 ? Math.round(n / totalRecords * 100) : 0;
        userSplitHTML += '<div class="stats-user-col"><div class="stats-user-name">' + (u.charAt(0).toUpperCase() + u.slice(1)) + '</div><div class="stats-user-num">' + n + '</div><div class="stats-user-pct">' + pct + '%</div></div>';
      });
      userSplitHTML += '</div>';
    }

    var barresLlocs = llocsSorted.slice(0, 6).map(function(id) {
      var nom = llocData[id] ? llocData[id].nom : id;
      var n = perLloc[id];
      var pct = Math.round(n / maxPerLloc * 100);
      return '<div class="stats-bar-row"><div class="stats-bar-label">' + nom + '</div><div class="stats-bar-wrap"><div class="stats-bar-fill" style="width:' + pct + '%"></div></div><div class="stats-bar-count">' + n + '</div></div>';
    }).join('');

    var timelineHTML = mesosKeys.length > 0 ? mesosKeys.map(function(m) {
      var n = perMes[m];
      var pct = Math.round(n / maxPerMes * 100);
      return '<div class="stats-month-row"><div class="stats-month-label">' + fmtMes(m) + '</div><div class="stats-month-bar-wrap"><div class="stats-month-bar-fill" style="width:' + pct + '%"></div></div><div class="stats-month-count">' + n + '</div></div>';
    }).join('') : '<div style="font-size:13px;color:var(--text-muted);font-style:italic;">Cap record amb data enregistrada.</div>';

    scroll.innerHTML =
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-card-num">' + totalLlocs + '</div><div class="stat-card-label">llocs visitats</div></div>' +
        '<div class="stat-card"><div class="stat-card-num">' + totalRecords + '</div><div class="stat-card-label">records guardats</div></div>' +
        '<div class="stat-card"><div class="stat-card-num">' + diesTotal + '</div><div class="stat-card-label">dies juntes</div></div>' +
        '<div class="stat-card"><div class="stat-card-num" style="font-size:14px;padding-top:4px;">' + llocEstrella + '</div><div class="stat-card-label">lloc amb més records</div></div>' +
      '</div>' +
      userSplitHTML +
      '<div class="stats-divider"></div>' +
      '<div class="stats-section-title">llocs amb més records</div>' +
      barresLlocs +
      '<div class="stats-section-title" style="margin-top:24px;">activitat per mes</div>' +
      '<div class="stats-timeline">' + timelineHTML + '</div>';
  });
}
function tancarStats() { document.getElementById('statsOverlay').classList.remove('active'); }
function seleccionarUsuariRecord(nom) {
  document.querySelectorAll('#recUsuariGroup .login-user-btn').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.usuari === nom);
  });
}
